{% extends "base.html" %}{% block content %}<h3 class="mb-3">Admin Panel</h3><div class="row"><div class="col-lg-6"><div class="card p-3"><h5 class="card-title">Add NGO</h5><form method="post"><div class="mb-2"><label class="form-label">NGO Name</label><input name="ngo_name" class="form-control"></div><div class="mb-2"><label class="form-label">Contact</label><input name="ngo_contact" class="form-control"></div><div class="mb-2"><label class="form-label">Email</label><input name="ngo_email" class="form-control"></div><button class="btn btn-primary w-100">Add NGO</button></form></div></div><div class="col-lg-6"><div class="card p-3"><h5 class="card-title">Users</h5>{% if users %}<div class="table-responsive"><table class="table table-sm"><thead><tr><th>Username</th><th>Role</th><th>Restaurant</th></tr></thead><tbody>{% for u in users %}<tr><td>{{ u.username }}</td><td>{{ u.role }}</td><td>{{ u.restaurant_name or '-' }}</td></tr>{% endfor %}</tbody></table></div>{% else %}<p class="small-muted">No users.</p>{% endif %}</div></div></div>{% endblock %}
