{% extends "base.html" %}{% block content %}<h3 class="mb-3">Donation</h3><div class="row"><div class="col-lg-5"><div class="card p-3"><h5 class="card-title">Donate Items</h5><form method="post"><div class="mb-2"><label class="form-label">Item</label><select name="menu_item_id" class="form-select">{% for it in items %}<option value='{{ it.id }}'>{{ it.name }}</option>{% endfor %}</select></div><div class="mb-2"><label class="form-label">NGO</label><select name="ngo_id" class="form-select">{% for n in ngos %}<option value='{{ n.id }}'>{{ n.name }}</option>{% endfor %}</select></div><div class="mb-2"><label class="form-label">Quantity (units)</label><input name="qty" class="form-control" type="number" step="0.01"></div><button class="btn btn-primary w-100">Donate</button></form></div></div><div class="col-lg-7"><div class="card p-3"><h5 class="card-title">Recent Donations</h5>{% if donations %}<div class="table-responsive"><table class="table table-sm"><thead><tr><th>Date</th><th>Item</th><th>NGO</th><th>Qty</th></tr></thead><tbody>{% for d in donations %}<tr><td>{{ d.created_at }}</td><td>{{ d.item_name }}</td><td>{{ d.ngo_name }}</td><td>{{ d.qty }} <span class="small-muted">units</span></td></tr>{% endfor %}</tbody></table></div>{% else %}<p class="small-muted">No donations yet.</p>{% endif %}</div></div></div>{% endblock %}
