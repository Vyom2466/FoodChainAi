{% extends "base.html" %}{% block content %}<h3 class="mb-3">Menu</h3><div class="row"><div class="col-lg-5"><div class="card p-3"><h5 class="card-title">Add Menu Item</h5><form method="post"><div class="mb-2"><label class="form-label">Item Name</label><input name="name" class="form-control" required></div><div class="mb-2"><label class="form-label">Category</label><input name="category" class="form-control"></div><div class="mb-2"><label class="form-label">Price</label><input name="price" class="form-control" type="number" step="0.01"></div><div class="mb-2"><label class="form-label">Shelf life (days)</label><input name="shelf_life_days" class="form-control" type="number"></div><button class="btn btn-primary w-100">Add Item</button></form></div></div><div class="col-lg-7"><div class="card p-3"><h5 class="card-title">Active Menu Items</h5>{% if items %}<div class="table-responsive"><table class="table table-sm"><thead><tr><th>Name</th><th>Category</th><th>Price</th><th>Action</th></tr></thead><tbody>{% for it in items %}<tr><td>{{ it.name }}</td><td>{{ it.category }}</td><td>₹{{ it.price }}</td><td><a href="{{ url_for('deactivate_menu_item', item_id=it.id) }}" class="btn btn-sm btn-outline-secondary">Deactivate</a></td></tr>{% endfor %}</tbody></table></div>{% else %}<p class="small-muted">No items yet.</p>{% endif %}</div></div></div>{% endblock %}
